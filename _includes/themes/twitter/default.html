<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Tianwei Lin</title>
    {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
    {% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}">{% endif %}
    <meta name="author" content="{{ site.author.name }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--[if lt IE 9]>
      <script src="http://html5shim.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link href="{{ ASSET_PATH }}/bootstrap/css/bootstrap.2.2.2.min.css" rel="stylesheet">
    <link href="{{ ASSET_PATH }}/css/style.css?body=1" rel="stylesheet" type="text/css" media="all">
    <link href="{{ ASSET_PATH }}/css/kbroman.css" rel="stylesheet" type="text/css" media="all">
    <link href="{{ ASSET_PATH }}/css/homepage.css" rel="stylesheet" type="text/css" media="all">

    <link rel="SHORTCUT ICON" href="{{ BASE_PATH }}/assets/me.ico"/>

    {% if site.JB.atom_path %}
    <link href="{{ BASE_PATH }}{{ site.JB.atom_path }}" type="application/atom+xml" rel="alternate" title="Sitewide ATOM Feed">
    {% endif %}
    {% if site.JB.rss_path %}
    <link href="{{ BASE_PATH }}{{ site.JB.rss_path }}" type="application/rss+xml" rel="alternate" title="Sitewide RSS Feed">
    {% endif %}
  </head>

  <body class="site-shell{% if page.homepage %} homepage{% endif %}{% if page.body_class %} {{ page.body_class }}{% else %} standard-page{% endif %}">
    <header class="site-header">
      <div class="site-frame site-header__inner">
        <a class="site-title" href="{{ HOME_PATH }}">Tianwei Lin</a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ HOME_PATH }}">Home</a>
          <a href="{{ BASE_PATH }}/pages/pubs.html">Publications</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="site-frame{% unless page.homepage %} site-frame--page{% endunless %}">
        {{ content }}
      </div>
    </main>

    {% include JB/analytics %}
  </body>
</html>
